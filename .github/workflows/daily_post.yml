name: Daily PPG Update

on:
  schedule:
    - cron: '1 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Uppdaterad från v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Uppdaterad från v4
        with:
          python-version: '3.11' # Uppdaterad till en nyare stabil version

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib scipy atproto

      - name: Run PPG script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python main.py
